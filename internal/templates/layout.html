{{ define "layout-start" }}
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17211b;
      background: #f5f7f2;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid #d8dfd1;
      background: #ffffff;
    }

    .topbar,
    main {
      width: min(94vw, 1040px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 64px;
    }

    .brand {
      font-weight: 700;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    nav a {
      color: #2d4737;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 6px;
    }

    nav a[aria-current="page"] {
      background: #e5eddf;
    }

    main {
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #4b5a50;
    }

    a {
      color: #1f5f43;
    }

    .panel {
      margin-top: 24px;
      padding: 24px;
      border: 1px solid #d8dfd1;
      border-radius: 8px;
      background: #ffffff;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
    }

    .button,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid #9fb59f;
      border-radius: 6px;
      background: #2f6f4e;
      color: #ffffff;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .button.secondary,
    button.secondary {
      background: #ffffff;
      color: #2f4b38;
    }

    .error {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #d7a2a2;
      border-radius: 6px;
      background: #fff4f4;
      color: #7d2020;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e4e8df;
      text-align: left;
      vertical-align: middle;
    }

    th {
      font-size: 0.9rem;
      color: #405346;
    }

    form.inline {
      display: inline;
    }

    .admin-session {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #405346;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 600;
    }

    input,
    select {
      width: min(100%, 420px);
      box-sizing: border-box;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #b8c5b2;
      border-radius: 6px;
      font: inherit;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #e5eddf;
      color: #24452f;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .badge.inactive {
      background: #eeeeea;
      color: #62675f;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">Camping WiFi Admin</div>
      <nav aria-label="Navigation principale">
        <a href="/" {{ if eq .ActiveNav "dashboard" }}aria-current="page"{{ end }}>Dashboard</a>
        <a href="/tickets" {{ if eq .ActiveNav "tickets" }}aria-current="page"{{ end }}>Tickets</a>
        <a href="/pitches" {{ if eq .ActiveNav "pitches" }}aria-current="page"{{ end }}>Emplacements</a>
      </nav>
      {{ if .CurrentAdmin }}
      <div class="admin-session">
        <span>{{ if .CurrentAdmin.DisplayName }}{{ .CurrentAdmin.DisplayName }}{{ else }}{{ .CurrentAdmin.Username }}{{ end }}</span>
        <form class="inline" method="post" action="/api/admin/auth/logout">
          <button class="secondary" type="submit">Déconnexion</button>
        </form>
      </div>
      {{ end }}
    </div>
  </header>
  <main>
{{ end }}

{{ define "layout-end" }}
  </main>
</body>
</html>
{{ end }}
