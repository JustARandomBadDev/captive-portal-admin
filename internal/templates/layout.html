{{ define "layout-start" }}
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17211b;
      background: #f5f7f2;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid #d8dfd1;
      background: #ffffff;
    }

    .topbar,
    main {
      width: min(94vw, 1040px);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 64px;
    }

    .brand {
      font-weight: 700;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    nav a {
      color: #2d4737;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 6px;
    }

    nav a[aria-current="page"] {
      background: #e5eddf;
    }

    main {
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      line-height: 1.5;
      color: #4b5a50;
    }

    .panel {
      margin-top: 24px;
      padding: 24px;
      border: 1px solid #d8dfd1;
      border-radius: 8px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">Camping WiFi Admin</div>
      <nav aria-label="Navigation principale">
        <a href="/" {{ if eq .ActiveNav "dashboard" }}aria-current="page"{{ end }}>Dashboard</a>
        <a href="/tickets" {{ if eq .ActiveNav "tickets" }}aria-current="page"{{ end }}>Tickets</a>
        <a href="/pitches" {{ if eq .ActiveNav "pitches" }}aria-current="page"{{ end }}>Emplacements</a>
      </nav>
    </div>
  </header>
  <main>
{{ end }}

{{ define "layout-end" }}
  </main>
</body>
</html>
{{ end }}
