{{ template "layout-start" . }}
<h1>{{ .Heading }}</h1>
<p>{{ .Description }}</p>
{{ if .Error }}
<p class="error">{{ .Error }}</p>
{{ end }}
<section class="panel" aria-labelledby="pitch-form-title">
  <h2 id="pitch-form-title">Informations</h2>
  <form method="post" action="/pitches">
    <label for="code">Code</label>
    <input id="code" name="code" value="{{ .Code }}" required autofocus>

    <label for="label">Libelle</label>
    <input id="label" name="label" value="{{ .Label }}">

    <div class="toolbar">
      <a class="button secondary" href="/pitches">Annuler</a>
      <button type="submit">Creer</button>
    </div>
  </form>
</section>
{{ template "layout-end" . }}
